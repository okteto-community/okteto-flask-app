# Okteto Manifest (v2)
# Reference: https://www.okteto.com/docs/core/okteto-manifest/

# Build the API image with the Okteto Build Service. The image name matches the
# "api" service in docker-compose.yml, so it overrides the image used on deploy.
build:
  api:
    context: .
    dockerfile: Dockerfile
    target: python

# Deploy the application (Flask API + CouchDB) from the Docker Compose file.
deploy:
  compose: docker-compose.yml

# Development Containers used by `okteto up`.
dev:
  api:
    command: bash
    sync:
      - .:/flask_app
    forward:
      - 5050:5050
    volumes:
      - /root/.cache/pip
